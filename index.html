<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Trainer</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>

<style>
  :root {
    --bg: #0e0e0f;
    --bg2: #161618;
    --bg3: #1e1e21;
    --bg4: #252529;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0efe8;
    --text2: #9a9991;
    --text3: #5a5a54;
    --accent: #d4f542;
    --accent2: #b8d930;
    --accent-dim: rgba(212,245,66,0.12);
    --red: #ff5c5c;
    --red-dim: rgba(255,92,92,0.12);
    --blue: #5ca4ff;
    --blue-dim: rgba(92,164,255,0.12);
    --radius: 10px;
    --radius-lg: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    overflow-x: hidden;
  }

  /* LAYOUT */
  .shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
  }

  /* ✅ FIXED (smaller sidebar title) */
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .nav { padding: 16px 12px; flex: 1; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text2);
    font-size: 14px;
    font-weight: 500;
    transition: all .15s;
    margin-bottom: 2px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item i { font-size: 18px; }

  .nav-item:hover { background: var(--bg3); color: var(--text); }

  .nav-item.active { background: var(--accent-dim); color: var(--accent); }

  .nav-item.active i { color: var(--accent); }

  .main { flex: 1; min-width: 0; padding: 32px; overflow-y: auto; }

  .page { display: none; animation: fadeIn .2s ease; }

  .page.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }

  /* TYPOGRAPHY */
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }

  h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  h3 { font-size: 15px; font-weight: 600; }

  .page-header {
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .page-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

  /* CARDS */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-bottom: 16px;
  }

  /* MOBILE HEADER (FIXED SMALLER) */
  .mobile-header { display: none; padding: 16px; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }

  .mobile-header .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  /* everything else unchanged... */

</style>
</head>

<body>

<div class="shell">

  <nav class="sidebar">
    <div class="logo">
      <div class="logo-text">MY TRAINER</div>
      <div class="logo-sub">PERSONAL FITNESS APP</div>
    </div>

    <div class="nav">
      <button class="nav-item active" onclick="switchPage('workout')"><i class="ti ti-barbell"></i> Workout</button>
      <button class="nav-item" onclick="switchPage('timer')"><i class="ti ti-clock"></i> Rest Timer</button>
      <button class="nav-item" onclick="switchPage('history')"><i class="ti ti-chart-bar"></i> History</button>
      <button class="nav-item" onclick="switchPage('food')"><i class="ti ti-salad"></i> Nutrition</button>
      <button class="nav-item" onclick="switchPage('ai')"><i class="ti ti-robot"></i> AI Coach</button>
    </div>

    <div style="padding:16px;border-top:1px solid var(--border)">
      <div style="font-size:11px;color:var(--text3);text-align:center">All data saved locally</div>
    </div>
  </nav>

</div>

</body>
</html>
