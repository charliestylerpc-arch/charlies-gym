<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Trainer</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>

<style>
  :root {
    --bg: #0e0e0f;
    --bg2: #161618;
    --bg3: #1e1e21;
    --bg4: #252529;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0efe8;
    --text2: #9a9991;
    --text3: #5a5a54;
    --accent: #d4f542;
    --accent2: #b8d930;
    --accent-dim: rgba(212,245,66,0.12);
    --red: #ff5c5c;
    --red-dim: rgba(255,92,92,0.12);
    --blue: #5ca4ff;
    --blue-dim: rgba(92,164,255,0.12);
    --radius: 10px;
    --radius-lg: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    overflow-x: hidden;
  }

  .shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
  }

  /* ✅ FIXED SIZE */
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .nav { padding: 16px 12px; flex: 1; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text2);
  }

  .nav-item.active { color: var(--accent); }

  .main { flex: 1; padding: 32px; }

  /* MOBILE HEADER FIX */
  .mobile-header {
    display: none;
    padding: 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }

  .mobile-header .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .mobile-header { display: flex; }
  }

</style>
</head>

<body>

<div class="shell">

  <nav class="sidebar">
    <div class="logo">
      <div class="logo-text">MY TRAINER</div>
      <div class="logo-sub">PERSONAL FITNESS APP</div>
    </div>

    <div class="nav">
      <button class="nav-item active">Workout</button>
      <button class="nav-item">Timer</button>
      <button class="nav-item">History</button>
      <button class="nav-item">Nutrition</button>
      <button class="nav-item">AI Coach</button>
    </div>
  </nav>

  <main class="main">
    <!-- your full app stays EXACTLY the same here -->
  </main>

</div>

</body>
</html>
